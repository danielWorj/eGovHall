<div class="portal-citoyen">
<header class="portal-header">
  <div class="portal-header-inner">
    <div class="portal-brand">
      <div class="portal-brand-icon">M</div>
      <div class="portal-brand-text">
        <strong>Mairie de Douala</strong>
        <small>Mon Espace Citoyen</small>
      </div>
    </div>
    <div class="d-flex align-items-center gap-3">
      <a routerLink="portail-citoyen/home" routerLinkActive="active" style="font-size:13px;color:var(--text-muted);font-weight:600"><i class="bi bi-house me-1"></i>Accueil</a>
      <div class="portal-user-pill">
        <div class="portal-user-avatar">JM</div>
        Jean Mbida
      </div>
      <a routerLink="portail-citoyen/login" style="font-size:13px;color:var(--text-muted);font-weight:600"><i class="bi bi-box-arrow-right me-1"></i>Déconnexion</a>
    </div>
  </div>
</header>

<div class="portal-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebarEl">
    <div style="padding:0 24px;margin-bottom:20px">
      <div style="background:rgba(0,49,137,0.04);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0">JM</div>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text-dark)">Jean Mbida</div>
          <div style="font-size:11px;color:var(--text-muted)">Citoyen vérifié</div>
        </div>
        <i class="bi bi-patch-check-fill ms-auto" style="color:#198754;font-size:16px"></i>
      </div>
    </div>

    <!-- Dashboard -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Tableau de bord</div>
      <a routerLink="portail-citoyen/home" routerLinkActive="active" class="sidebar-item" data-panel="dashboard">
        <i class="bi bi-grid-1x2"></i> Aperçu général
      </a>
    </div>

    <!-- État Civil -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">État Civil</div>
      <a routerLink="portail-citoyen/naissance" routerLinkActive="active" class="sidebar-item" data-panel="naissance">
        <i class="bi bi-file-earmark-person"></i> Acte de Naissance
        <span class="sidebar-badge">2</span>
      </a>
      <a routerLink="portail-citoyen/mariage" routerLinkActive="active" class="sidebar-item" data-panel="mariage">
        <i class="bi bi-heart"></i> Acte de Mariage
      </a>
    </div>

    <!-- Logement -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Logement</div>
      <a routerLink="portail-citoyen/permis" routerLinkActive="active" class="sidebar-item" data-panel="permis">
        <i class="bi bi-building"></i> Permis de Bâtir
        <span class="sidebar-badge" style="background:var(--gold)">1</span>
      </a>
    </div>

    <!-- Paiements -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Finances</div>
      <a routerLink="portail-citoyen/paiements" routerLinkActive="active" class="sidebar-item" data-panel="paiements">
        <i class="bi bi-credit-card"></i> Mes Paiements
      </a>
    </div>

    <div class="sidebar-divider"></div>
    <a routerLink="portail-citoyen/rdv" routerLinkActive="active" class="sidebar-item">
      <i class="bi bi-calendar3"></i> Mes Rendez-vous
    </a>
    <a href="#" class="sidebar-item">
      <i class="bi bi-bell"></i> Notifications
      <span class="sidebar-badge">3</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="bi bi-gear"></i> Paramètres
    </a>
  </aside>

  <!-- MAIN -->
  <main class="portal-main">
        <router-outlet></router-outlet>
  </main>
</div>

<button class="sidebar-toggle" onclick="document.getElementById('sidebarEl').classList.toggle('open')">
  <i class="bi bi-list"></i>
</button>
</div>
